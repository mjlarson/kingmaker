name: CI

on:
  push:
    branches: main
  pull_request:
    branches: main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Linting and Type Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run ruff format check
        run: |
          ruff format --check .

      - name: Run ruff linter
        run: |
          ruff check .

      - name: Run mypy type checking
        run: |
          mypy kingmaker --show-error-codes --pretty
        continue-on-error: true  # Don't fail CI on type errors yet

  test:
    name: Tests - ${{ matrix.test_file }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test_file:
          - test_basic
          - test_king_pdf
          - test_interpolated_king_pdf
          - test_template_smeared_king_pdf
          - test_utils
          - test_fitting

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest tests/${{ matrix.test_file }}.py --cov=kingmaker --cov-report=xml --cov-report=term -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: ${{ matrix.test_file }}
          fail_ci_if_error: true
        continue-on-error: true  # Don't fail CI if Codecov upload fails
          
  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: |
          python -m build

      - name: Check package for PyPI compliance
        run: |
          pip install twine
          twine check dist/*
